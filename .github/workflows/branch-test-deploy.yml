name: Branch Deploy - KIA Demo

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  deployments: write
  contents: write
  checks: write
  statuses: write

jobs:
  deploy:
    if: ${{ github.event.issue.pull_request }}
    name: Deploy to Test Environment
    runs-on: ubuntu-latest

    environment:
      name: test

    steps:

      - name: Parse branch-deploy command
        uses: github/branch-deploy@v9
        id: branch-deploy
        with:
          trigger: ".deploy"
          environment: "test"
          stable_branch: "main"
          update_branch: "warn"

      - name: Checkout code
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch-deploy.outputs.sha }}
          fetch-depth: 0

      - name: Set up Python
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests before deployment
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          pytest test/ -v

      - name: Display deployment package (noop mode)
        if: >-
          ${{ steps.branch-deploy.outputs.continue == 'true' &&
              steps.branch-deploy.outputs.noop == 'true' }}
        run: |
          echo "NOOP MODE - Would deploy:"
          echo "SHA: ${{ steps.branch-deploy.outputs.sha }}"
          echo "Ref: ${{ steps.branch-deploy.outputs.ref }}"

      - name: Deploy to environment
        if: >-
          ${{ steps.branch-deploy.outputs.continue == 'true' &&
              steps.branch-deploy.outputs.noop != 'true' }}
        run: |
          echo "Deploying ${{ steps.branch-deploy.outputs.ref }} to test environment..."
          # Agrega aqui tu logica de deploy real
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
