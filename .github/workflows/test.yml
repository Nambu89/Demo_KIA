name: Testing - Nightly & Scheduled

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly-test:
    name: Nightly Test Suite (Verbose)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      checks: write
      contents: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (verbose)
        id: pytest_run
        continue-on-error: true
        run: |
          pytest test/ -vv --junitxml=test-results.xml --cov=src/miapi --cov-report=term --cov-report=html:htmlcov

      - name: Check if test-results.xml exists
        id: check_xml
        run: |
          if [ -f test-results.xml ]; then
            echo "xml_exists=true" >> $GITHUB_OUTPUT
          else
            echo "xml_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nightly
          path: test-results.xml
          if-no-files-found: ignore

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-nightly
          path: htmlcov/
          if-no-files-found: ignore

      - name: Publish test report
        if: always() && steps.check_xml.outputs.xml_exists == 'true'
        uses: dorny/test-reporter@v1
        with:
          name: Pytest Results (Nightly)
          path: test-results.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: always() && steps.pytest_run.outcome == 'failure'
        run: |
          echo "Nightly tests failed. Check logs above for details."
          exit 1
